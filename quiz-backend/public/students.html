<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz App - Student</title>
  <style>
    .question {
      margin-bottom: 20px;
    }

    #submitBtn {
      display: none;
      margin-top: 20px;
    }

    #timerDisplay {
      font-size: 1.5em;
      color: red;
    }

    #questionsContainer {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Student Dashboard</h1>

  <!-- Timer and Questions Section -->
  <div id="timerDisplay"></div>
  <div id="questionsContainer"></div>

  <!-- Submit Button -->
  <button id="submitBtn">Submit Answers</button>

  <script>
    const timerDisplay = document.getElementById("timerDisplay");
    const questionsContainer = document.getElementById("questionsContainer");
    const submitBtn = document.getElementById("submitBtn");

    let timerInterval;
    let questions = [];
    let answers = {};
    let remainingTime = 0;

    const token = localStorage.getItem("token");

    if (!token) {
      alert("No valid token found. Please log in as a student.");
    }

    // Check session status on page load to see if the test has started
    async function checkTestStatus() {
      try {
        const response = await fetch("http://localhost:3000/session/status");
        const data = await response.json();

        if (!data.testStarted) {
          timerDisplay.textContent = "Test has not started yet.";
          return;
        }

        remainingTime = data.remainingTimeMs;
        startCountdown();

        // Get the questions from the server once test starts
        getQuestions();
      } catch (err) {
        console.error("Error checking session status:", err);
        alert("Failed to contact server.");
      }
    }

    // Fetch quiz questions
    async function getQuestions() {
      try {
        const response = await fetch("http://localhost:3000/questions");
        const data = await response.json();

        questions = data.questions;
        displayQuestions();

      } catch (err) {
        console.error("Error fetching questions:", err);
        alert("Failed to fetch questions.");
      }
    }

    // Display questions to the student
    function displayQuestions() {
      questionsContainer.innerHTML = "";  // Clear previous questions if any

      questions.forEach((question) => {
        const div = document.createElement("div");
        div.classList.add("question");

        const questionText = document.createElement("p");
        questionText.textContent = question.text;

        div.appendChild(questionText);

        const options = ["a", "b", "c", "d"];
        options.forEach((option) => {
          const label = document.createElement("label");
          label.textContent = question[option];

          const input = document.createElement("input");
          input.type = "radio";
          input.name = `question-${question.id}`;
          input.value = option;

          input.addEventListener("change", () => {
            answers[question.id] = option;
          });

          div.appendChild(input);
          div.appendChild(label);
          div.appendChild(document.createElement("br"));
        });

        questionsContainer.appendChild(div);
      });

      // Show the submit button
      submitBtn.style.display = "inline-block";
    }

    // Start the countdown timer
    function startCountdown() {
      timerInterval = setInterval(() => {
        if (remainingTime <= 0) {
          clearInterval(timerInterval);
          timerDisplay.textContent = "Time's up!";
          submitBtn.disabled = true;
          submitAnswers(); // Automatically submit answers when time runs out
        } else {
          const minutesLeft = Math.floor(remainingTime / 1000 / 60);
          const secondsLeft = Math.floor((remainingTime / 1000) % 60);
          timerDisplay.textContent = `Time left: ${minutesLeft}m ${secondsLeft}s`;
          remainingTime -= 1000;
        }
      }, 1000);
    }

    // Submit the answers to the server
    async function submitAnswers() {
      try {
        const response = await fetch("http://localhost:3000/submit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            token,
            answers
          })
        });

        const data = await response.json();

        if (!response.ok) {
          alert(data.error || "Failed to submit answers.");
        } else {
          alert("Answers submitted successfully!");
        }
      } catch (err) {
        console.error("Error submitting answers:", err);
        alert("Failed to submit answers.");
      }
    }

    // Submit button click event
    submitBtn.addEventListener("click", () => {
      submitAnswers();
    });

    // Run the initial check for session status when the page loads
    checkTestStatus();
  </script>
</body>
</html>
